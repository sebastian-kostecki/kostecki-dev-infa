# Local Traefik for routing tests (no SSL).
# Run: docker network create proxy && docker compose -f docker-compose.dev.yml up -d
services:
  traefik:
    image: traefik:v3.6.6
    container_name: traefik-dev
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=proxy
      - --entrypoints.web.address=:80
      - --api.insecure=true
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - proxy

networks:
  proxy:
    name: proxy
    external: true
